<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Die Keto-Lernreise</title>
<style>
  :root{
    --ink: #2b2a35;
    --ink-dim: #6b6879;
    --ink-faint: #9491a3;
    --glass-bg: rgba(255,255,255,0.55);
    --glass-bg-strong: rgba(255,255,255,0.78);
    --glass-border: rgba(255,255,255,0.65);
    --glass-shadow: 0 8px 32px rgba(80,70,140,0.12);
    --gruen: #4f9d6e;
    --gelb: #c8933a;
    --rot: #c85a52;
    --accent: #a878d1;
    --accent2: #5fb8c9;
    --font-display: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{font-size:119%;} /* seniorenfreundlich: alle rem-basierten Schriftgrößen app-weit etwas größer */
  html,body{height:100%;}
  body{
    background:linear-gradient(180deg,#fdf9f6 0%, #f6f4fb 45%, #f2f8f6 100%);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 16px 90px;
    line-height:1.5;
    position:relative;
    overflow-x:hidden;
  }

  /* ---------- Bokeh-Hintergrund ---------- */
  .bokeh{position:fixed; inset:0; overflow:hidden; z-index:-1; pointer-events:none;}
  .orb{position:absolute; border-radius:50%; filter:blur(60px); opacity:0.55; will-change:transform;}
  .orb1{width:340px; height:340px; background:radial-gradient(circle at 30% 30%, #ffd6e8, transparent 70%); top:-80px; left:-60px; animation:float1 26s ease-in-out infinite;}
  .orb2{width:420px; height:420px; background:radial-gradient(circle at 40% 40%, #c9e8ff, transparent 70%); top:10%; right:-120px; animation:float2 32s ease-in-out infinite;}
  .orb3{width:300px; height:300px; background:radial-gradient(circle at 50% 50%, #d8ffe0, transparent 70%); bottom:5%; left:-80px; animation:float3 28s ease-in-out infinite;}
  .orb4{width:260px; height:260px; background:radial-gradient(circle at 50% 50%, #f3e0ff, transparent 70%); bottom:-60px; right:8%; animation:float1 22s ease-in-out infinite reverse;}
  .orb5{width:220px; height:220px; background:radial-gradient(circle at 50% 50%, #fff2c9, transparent 70%); top:40%; left:38%; animation:float2 30s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(40px,60px) scale(1.08);}66%{transform:translate(-30px,20px) scale(0.95);}}
  @keyframes float2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-60px,50px) scale(1.1);}}
  @keyframes float3{0%,100%{transform:translate(0,0) scale(1);}40%{transform:translate(50px,-40px) scale(1.05);}75%{transform:translate(-20px,-70px) scale(0.92);}}

  .wrap{width:100%; max-width:640px;}

  .glass{
    background:var(--glass-bg);
    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);
    border:1px solid var(--glass-border);
    box-shadow:var(--glass-shadow);
    border-radius:20px;
  }

  button{cursor:pointer; border:none; font-family:var(--font-body);}
  input[type=text], input[type=number]{
    background:rgba(255,255,255,0.75);
    border:1px solid rgba(255,255,255,0.85);
    color:var(--ink);
    font-size:1rem;
    padding:13px 16px;
    border-radius:12px;
    font-family:var(--font-body);
    outline:none;
    width:100%;
  }
  input:focus{border-color:var(--accent);}
  .btn-primary{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff;
    font-weight:600;
    font-size:0.98rem;
    padding:14px 18px;
    border-radius:12px;
    transition:filter 0.15s, transform 0.1s;
    box-shadow:0 6px 20px -6px rgba(150,120,200,0.55);
  }
  .btn-primary:hover{filter:brightness(1.06);}
  .btn-primary:active{transform:translateY(1px);}
  .btn-primary:disabled{opacity:0.4; cursor:not-allowed;}
  .btn-secondary{
    background:rgba(255,255,255,0.55);
    color:var(--ink-dim);
    border:1px solid rgba(255,255,255,0.8);
    border-radius:12px;
    padding:13px 16px;
    font-size:0.9rem;
  }
  .choice-row{display:flex; gap:8px; flex-wrap:wrap;}
  .choice-btn{
    background:rgba(255,255,255,0.5);
    border:1px solid rgba(255,255,255,0.8);
    color:var(--ink-dim);
    border-radius:12px;
    padding:11px 10px;
    font-size:0.84rem;
    flex:1;
    min-width:90px;
    text-align:center;
    transition:all 0.15s;
  }
  .choice-btn:hover{background:rgba(255,255,255,0.85); color:var(--ink);}
  .choice-btn.active{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff;
    border-color:transparent;
    box-shadow:0 4px 14px -4px rgba(150,120,200,0.6);
  }

  /* ---------- Logo ---------- */
  .logo-badge{display:flex; align-items:center; justify-content:center;}
  .logo-badge svg{display:block;}
  .logo-mini{width:34px; height:34px; flex-shrink:0;}

  /* ---------- Onboarding Wizard ---------- */
  .onboard{
    min-height:78vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px 6px;
  }
  .onboard-card{
    width:100%;
    max-width:420px;
    padding:36px 30px;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
  }
  .wizard-dots{display:flex; gap:7px; margin-bottom:4px;}
  .wizard-dots .wdot{width:7px; height:7px; border-radius:50%; background:rgba(150,140,170,0.3); transition:all 0.2s;}
  .wizard-dots .wdot.active{background:var(--accent); width:20px; border-radius:5px;}
  .onboard h1{font-family:var(--font-display); font-size:1.75rem; font-weight:400;}
  .onboard h2{font-family:var(--font-display); font-size:1.3rem; font-weight:400;}
  .onboard p.lead{color:var(--ink-dim); font-size:0.92rem; max-width:340px;}
  .onboard form{display:flex; flex-direction:column; gap:12px; width:100%;}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}
  .field-label{font-size:0.74rem; color:var(--ink-faint); text-align:left; margin-bottom:5px;}
  .wizard-actions{display:flex; gap:10px; width:100%; margin-top:6px;}
  .wizard-actions .btn-secondary{flex:0 0 auto;}
  .wizard-actions .btn-primary{flex:1;}

  .mini-cards{display:flex; flex-direction:column; gap:10px; width:100%; text-align:left;}
  .mini-card{
    display:flex; align-items:center; gap:12px;
    background:rgba(255,255,255,0.55);
    border:1px solid rgba(255,255,255,0.7);
    border-radius:14px;
    padding:12px 14px;
  }
  .mini-card .mc-icon{font-size:1.3rem; flex-shrink:0;}
  .mini-card .mc-text{font-size:0.82rem; color:var(--ink-dim);}

  /* ---------- Dashboard ---------- */
  header.top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom:18px;
    padding:0 4px;
  }
  .top-left{display:flex; align-items:center; gap:10px;}
  .hello{font-size:0.86rem; color:var(--ink-dim);}
  .hello b{color:var(--ink); font-weight:700;}
  .reset-link{
    background:none;
    color:var(--ink-faint);
    font-size:0.74rem;
    text-decoration:underline;
    text-underline-offset:3px;
  }

  /* ---------- Tag-Karussell (Kachel 1) ---------- */
  .day-carousel{position:relative; padding:22px 26px; margin-bottom:16px; overflow:hidden;}
  .day-page{}
  .rings-row{display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:14px;}
  .ring{position:relative; width:112px; height:112px; flex-shrink:0; border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .ring .hole{position:absolute; inset:7px; background:var(--glass-bg-strong); border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2;}
  .ring .daylabel{font-size:0.62rem; color:var(--ink-faint); letter-spacing:0.5px; text-transform:uppercase; line-height:1;}
  .ring .daynum{font-family:var(--font-display); font-size:1.5rem; line-height:1;}
  .ring .dayof{font-size:0.6rem; color:var(--ink-faint); letter-spacing:0.5px; margin-top:2px;}
  .countdown-ring .tick-svg{position:absolute; inset:0; width:100%; height:100%;}
  .tick{stroke:rgba(150,140,170,0.28); stroke-width:2.4; stroke-linecap:round; transition:stroke 0.4s;}
  .tick.lit{stroke:var(--accent);}
  .cd-time{font-family:var(--font-mono); font-size:0.86rem; letter-spacing:-0.4px; white-space:nowrap;}


  .carousel-nav-btn{
    position:absolute; top:52px;
    width:40px; height:40px; border-radius:50%;
    background:rgba(255,255,255,0.75); border:1px solid rgba(255,255,255,0.9);
    color:var(--ink-dim); font-size:1.6rem; line-height:1; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px -4px rgba(80,70,140,0.25);
    z-index:6;
  }
  .carousel-nav-btn:disabled{opacity:0.2; cursor:not-allowed;}
  .carousel-nav-btn.prev{left:8px;}
  .carousel-nav-btn.next{right:8px;}

  .recipe-cta{
    width:100%; margin-top:6px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff; font-weight:600; font-size:0.95rem;
    padding:15px 18px; border-radius:14px;
    box-shadow:0 8px 22px -6px rgba(150,120,200,0.55);
  }

  @keyframes slideInRight{from{transform:translateX(26px); opacity:0;} to{transform:translateX(0); opacity:1;}}
  @keyframes slideInLeft{from{transform:translateX(-26px); opacity:0;} to{transform:translateX(0); opacity:1;}}
  .slide-next{animation:slideInRight 0.28s ease-out;}
  .slide-prev{animation:slideInLeft 0.28s ease-out;}

  @keyframes pulseCard{
    0%,100%{box-shadow:0 0 0 0 rgba(168,120,209,0.4);}
    50%{box-shadow:0 0 0 7px rgba(168,120,209,0);}
  }

  .day-tip{font-size:0.77rem; color:var(--ink-faint); text-align:center; margin:-6px 4px 14px; font-style:italic;}

  .food-grid{
    display:flex;
    flex-direction:column;
    gap:9px;
    margin-bottom:16px;
  }
  .food-card{
    background:var(--glass-bg);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid var(--glass-border);
    border-left:3px solid var(--gruen);
    border-radius:14px;
    padding:12px 13px;
    cursor:pointer;
    transition:transform 0.12s;
  }
  .food-card:hover{transform:translateY(-2px);}
  .food-card.gelb{border-left-color:var(--gelb);}
  .food-card.rot{border-left-color:var(--rot);}
  .food-card .fname{font-size:0.87rem; font-weight:600; display:flex; align-items:center; gap:7px;}
  .food-card .femoji{font-size:1.15rem;}
  .food-card .fmeta{font-size:0.68rem; color:var(--ink-faint); margin-top:4px;}
  .food-card .fcolor{color:var(--gruen); font-weight:700;}
  .food-card.gelb .fcolor{color:var(--gelb);}
  .food-card.rot .fcolor{color:var(--rot);}
  .food-card .fhint{
    font-size:0.74rem;
    color:var(--ink-dim);
    margin-top:8px;
    line-height:1.4;
    white-space:normal;
    word-wrap:break-word;
    overflow-wrap:break-word;
  }
  .food-card .funlim{display:inline-block; margin-top:5px; margin-left:5px; font-size:0.58rem; color:var(--accent2); font-weight:600;}

  .food-card.locked{position:relative; border-left-color:rgba(168,120,209,0.6); overflow:hidden; animation:pulseCard 2.1s ease-in-out infinite;}
  .food-card.locked .locked-inner{filter:blur(7px); opacity:0.6; user-select:none;}
  .food-card.locked .unlock-overlay{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; background:rgba(255,255,255,0.4); text-align:center; padding:8px;
  }
  .food-card.locked .unlock-icon{font-size:1.3rem;}
  .food-card.locked .unlock-text{font-size:0.66rem; color:var(--ink); font-weight:600;}
  .food-card.locked .unlock-sub{font-size:0.58rem; color:var(--ink-dim);}
  .food-card.locked:hover .unlock-overlay{background:rgba(255,255,255,0.55);}

  /* ---------- Tages-Check Popup & Rezept-Bedarfsblock ---------- */
  .checkin-modal-row{margin-bottom:18px;}
  .checkin-modal-row .row-label{font-size:0.85rem; color:var(--ink-dim); margin-bottom:9px;}

  .recipe-needs{background:rgba(168,120,209,0.08); border-radius:14px; padding:14px 16px; margin-bottom:16px;}
  .recipe-needs .rn-title{font-family:var(--font-display); font-size:0.92rem; margin-bottom:9px;}
  .recipe-needs .rn-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:7px;}
  .recipe-needs .rn-stat{background:rgba(255,255,255,0.6); border-radius:10px; padding:8px; text-align:center;}
  .recipe-needs .rn-stat .rv{font-family:var(--font-display); font-size:1.05rem;}
  .recipe-needs .rn-stat .rl{font-size:0.62rem; color:var(--ink-faint);}
  .recipe-needs .rn-tip{font-size:0.7rem; color:var(--ink-dim); margin-top:9px; line-height:1.5;}


  /* ---------- Modal ---------- */
  .overlay{position:fixed; inset:0; background:rgba(70,60,90,0.28); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;}
  .overlay.hidden{display:none;}
  .modal{
    background:rgba(255,255,255,0.88);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid rgba(255,255,255,0.9);
    border-radius:20px;
    max-width:440px; width:100%;
    padding:24px;
    max-height:85vh;
    overflow-y:auto;
    box-shadow:0 20px 60px -12px rgba(80,60,120,0.35);
  }
  .modal-head{display:flex; align-items:center; gap:12px; margin-bottom:6px;}
  .modal-head .femoji{font-size:1.9rem;}
  .modal-head h3{font-family:var(--font-display); font-weight:400; font-size:1.2rem;}
  .modal .tag-line{font-size:0.68rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--gruen); margin-bottom:14px;}
  .modal.gelb .tag-line{color:var(--gelb);}
  .modal.rot .tag-line{color:var(--rot);}
  .modal p.desc{font-size:0.88rem; color:var(--ink-dim); margin-bottom:14px;}
  table.macro{width:100%; border-collapse:collapse; font-family:var(--font-mono); font-size:0.78rem;}
  table.macro td{padding:6px 4px; border-bottom:1px solid rgba(150,140,170,0.2);}
  table.macro td:first-child{color:var(--ink-faint);}
  table.macro td:last-child{text-align:right;}
  .macro-note{font-size:0.66rem; color:var(--ink-faint); margin-top:9px;}
  .close-btn{margin-top:18px; width:100%; background:rgba(255,255,255,0.6); color:var(--ink-dim); border:1px solid rgba(255,255,255,0.8); border-radius:11px; padding:11px; font-size:0.84rem;}

  .recipe-block{margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid rgba(150,140,170,0.2);}
  .recipe-block:last-of-type{border-bottom:none; margin-bottom:4px;}
  .recipe-block .rmeal{font-size:0.64rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--accent); font-weight:700;}
  .recipe-block h4{font-family:var(--font-display); font-weight:400; font-size:1.02rem; margin:4px 0 4px;}
  .recipe-block .rdesc{font-size:0.8rem; color:var(--ink-dim); margin-bottom:8px;}
  .recipe-block ul.zutaten{list-style:none; font-size:0.8rem; margin-bottom:8px;}
  .recipe-block ul.zutaten li{padding:3px 0; display:flex; justify-content:space-between; gap:10px;}
  .recipe-block ul.zutaten li .zname{color:var(--ink);}
  .recipe-block ul.zutaten li .zamt{color:var(--ink-faint); white-space:nowrap;}
  .recipe-block ol.schritte{font-size:0.78rem; color:var(--ink-dim); padding-left:18px;}
  .recipe-block ol.schritte li{margin-bottom:4px;}
  .recipe-intro{font-size:0.76rem; color:var(--ink-faint); margin-bottom:12px; line-height:1.5;}

  /* ---------- Completion ---------- */
  .complete-card{text-align:center; padding:28px 22px; margin-bottom:16px;}
  .complete-card h2{font-family:var(--font-display); font-weight:400; font-size:1.3rem; margin-bottom:9px;}
  .complete-card p{color:var(--ink-dim); font-size:0.88rem;}
  .wellbeing-summary{
    margin-top:16px; padding-top:16px; border-top:1px solid rgba(150,140,170,0.2);
    text-align:left;
  }
  .wellbeing-summary h4{font-family:var(--font-display); font-weight:400; font-size:0.95rem; margin-bottom:8px; text-align:center;}
  .wb-counts{display:flex; justify-content:center; gap:16px; margin-bottom:8px;}
  .wb-counts div{text-align:center; font-size:0.78rem; color:var(--ink-dim);}
  .wb-counts .wb-num{font-family:var(--font-display); font-size:1.2rem; display:block;}
  .wellbeing-summary .wb-trend{font-size:0.8rem; color:var(--ink-dim); text-align:center;}

  .complete-cta{width:100%; font-size:1.05rem; padding:18px 20px;}

  .activity-summary{
    margin-top:16px; padding-top:16px; border-top:1px solid rgba(150,140,170,0.2);
    text-align:left;
  }
  .activity-summary h4{font-family:var(--font-display); font-weight:400; font-size:0.95rem; margin-bottom:8px; text-align:center;}
  .act-counts{display:flex; justify-content:center; gap:16px; margin-bottom:8px;}
  .act-counts div{text-align:center; font-size:0.78rem; color:var(--ink-dim);}
  .act-counts .act-num{font-family:var(--font-display); font-size:1.2rem; display:block;}
  .activity-summary .act-trend{font-size:0.8rem; color:var(--ink-dim); text-align:center;}

  .unlocked-strip{margin-top:14px;}
  .unlocked-strip .us-label{font-size:0.7rem; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:8px; text-align:center;}
  .unlocked-rows{display:flex; gap:8px; align-items:flex-start;}
  .unlocked-row{
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:6px;
    max-height:230px;
    overflow-y:auto;
    padding-right:2px;
  }
  .unlocked-chip{
    display:flex; align-items:center; gap:5px;
    width:100%;
    box-sizing:border-box;
    border-radius:14px;
    border:1px solid var(--rot);
    background:rgba(200,90,82,0.3);
    padding:6px 10px;
    font-size:0.72rem;
    color:var(--ink);
    white-space:normal;
    line-height:1.25;
  }
  .unlocked-chip.gelb{border-color:var(--gelb); background:rgba(200,147,58,0.3);}
  .unlocked-chip.gruen{border-color:var(--gruen); background:rgba(79,157,110,0.3);}
  .unlocked-chip .uc-emoji{font-size:0.95rem; flex-shrink:0;}

  .food-rain{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:999;}
  .food-rain span{position:absolute; top:-40px; will-change:transform, opacity;}
  @keyframes foodFall{
    0%{transform:translateY(0) rotate(0deg); opacity:1;}
    100%{transform:translateY(115vh) rotate(360deg); opacity:0.85;}
  }

  .debug-panel{margin-top:14px; padding:12px 14px; border:1px dashed var(--rot); border-radius:12px; background:rgba(200,90,82,0.06); font-size:0.74rem; color:var(--ink-dim); display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .debug-panel button{background:var(--rot); color:#fff; border-radius:8px; padding:8px 12px; font-size:0.72rem; white-space:nowrap;}

  @media (max-width:420px){
    .rings-row{gap:12px;}
    .ring{width:96px; height:96px;}
  }
</style>
</head>
<body>

<div class="bokeh">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
  <div class="orb orb5"></div>
</div>

<div class="wrap" id="app"></div>

<div class="overlay hidden" id="overlay">
  <div class="modal" id="modalBody"></div>
</div>

<script>
function logoSvg(size){
  return `
  <svg width="${size}" height="${size}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#a878d1"/>
        <stop offset="1" stop-color="#5fb8c9"/>
      </linearGradient>
    </defs>
    <circle cx="50" cy="50" r="47" fill="url(#lg1)" opacity="0.13"/>

  wenig:{label:"Wenig bewegt", protPerKg:1.2, tdeeFactor:1.2},
  mittel:{label:"Mittel bewegt", protPerKg:1.6, tdeeFactor:1.375},

};

const K = {
  name:"ketoreise_name", age:"ketoreise_alter", height:"ketoreise_groesse", weight:"ketoreise_gewicht",
  start:"ketoreise_start", revealed:"ketoreise_revealed", checkin:"ketoreise_checkin", wblog:"ketoreise_wb_log",
  actlog:"ketoreise_act_log",
};
const MS_PRO_TAG = 24 * 60 * 60 * 1000;
const REF_PROTEIN = 112;

function getState(){
  const name = localStorage.getItem(K.name);
  const age = parseFloat(localStorage.getItem(K.age));
  const height = parseFloat(localStorage.getItem(K.height));
  const weight = parseFloat(localStorage.getItem(K.weight));
  const start = localStorage.getItem(K.start);
  if(!name || !start || !weight || !age || !height) return null;
  return { name, age, height, weight, start: parseInt(start, 10) };
}

/* Check-ins hängen am Reise-Tag (1..21), nicht am Kalenderdatum -
   so wird bei jedem neuen Tag der Fragebogen erneut gezeigt, und alle
   Tage fließen sauber in die Abschluss-Analyse bei Tag 21 ein. */
function getCheckinAll(){
  try{
    const raw = localStorage.getItem(K.checkin);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}

function getCheckin(day){
  const all = getCheckinAll();
  const entry = all[day];
  return entry ? {activity: entry.activity || null, wellbeing: entry.wellbeing || null} : {activity:null, wellbeing:null};
}

function setCheckin(day, partial){
  const all = getCheckinAll();
  const current = all[day] || {activity:null, wellbeing:null};
  const merged = {...current, ...partial};
  all[day] = merged;
  localStorage.setItem(K.checkin, JSON.stringify(all));
  if(merged.wellbeing){
    logWellbeing(day, merged.wellbeing);
  }
  if(merged.activity){
    logActivity(day, merged.activity);
  }
}

function logActivity(day, level){
  let log = [];
  try{ log = JSON.parse(localStorage.getItem(K.actlog)) || []; }catch(e){ log = []; }
  const idx = log.findIndex(e => e.day === day);
  if(idx >= 0) log[idx].level = level;
  else log.push({day, level});
  log.sort((a,b) => a.day - b.day);
  localStorage.setItem(K.actlog, JSON.stringify(log));
}

function getActivityLog(){
  try{ return JSON.parse(localStorage.getItem(K.actlog)) || []; }catch(e){ return []; }
}

function logWellbeing(day, level){
  let log = [];
  try{ log = JSON.parse(localStorage.getItem(K.wblog)) || []; }catch(e){ log = []; }
  const idx = log.findIndex(e => e.day === day);
  if(idx >= 0) log[idx].level = level;
  else log.push({day, level});
  log.sort((a,b) => a.day - b.day);
  localStorage.setItem(K.wblog, JSON.stringify(log));
}

function getWellbeingLog(){
  try{ return JSON.parse(localStorage.getItem(K.wblog)) || []; }catch(e){ return []; }
}

function getRevealed(){
  try{ const raw = localStorage.getItem(K.revealed); return raw ? JSON.parse(raw) : []; }catch(e){ return []; }
}
function revealItem(id){
  const revealed = getRevealed();
  if(!revealed.includes(id)){ revealed.push(id); localStorage.setItem(K.revealed, JSON.stringify(revealed)); }
}

function currentDay(start){
  const elapsed = Date.now() - start;
  const day = Math.floor(elapsed / MS_PRO_TAG) + 1;
  return Math.min(Math.max(day, 1), TAGE.length);
}
function msBisNaechstemTag(start, day){
  if(day >= TAGE.length) return 0;
  const naechsterStart = start + day * MS_PRO_TAG;
  return Math.max(naechsterStart - Date.now(), 0);
}
function formatDauer(ms){
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}
function alleItemsBisTag(day){
  let items = [];
  for(let i=0; i<day; i++) items = items.concat(TAGE[i].items);
  return items;
}
function isDebugMode(){
  try{ return new URLSearchParams(window.location.search).get("debug") === "1"; }catch(e){ return false; }
}

function computeTargets(age, height, weight, level){
  const a = AKTIVITAET[level] || AKTIVITAET.mittel;
  const bmr = 10*weight + 6.25*height - 5*age - 78; // unisex-Näherung (Mittel aus Mifflin-St Jeor m/w)
  const kcal = Math.round(Math.max(bmr, 800) * a.tdeeFactor);
  const protein = Math.round(weight * a.protPerKg);
  const carbs = 25;
  const fettFull = Math.max(Math.round((kcal - protein*4 - carbs*4) / 9), 0);
  const fettMin = Math.max(Math.round(fettFull * 0.5), 0);
  return {protein, kcal, carbs, fettMin, fettMax: fettFull};
}

function scaleAmount(base, factor){
  const val = base * factor;
  return Math.max(Math.round(val/5)*5, 5);
}
function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function renderOnboarding(){
  if(intervalHandle) clearInterval(intervalHandle);
  if(onboardStep === 1) renderOnboardStep1();
  else if(onboardStep === 2) renderOnboardStep2();
  else renderOnboardStep3();
}

function wizardDots(step){
  let html = '<div class="wizard-dots">';
  for(let i=1;i<=3;i++) html += `<div class="wdot ${i===step?'active':''}"></div>`;
  return html + '</div>';
}

          <div class="mini-card"><div class="mc-icon">🍽️</div><div class="mc-text">Täglich 3 Rezepte, passend zu deinem Bedarf berechnet.</div></div>
          <div class="mini-card"><div class="mc-icon">💬</div><div class="mc-text">Kurzer Check-in täglich: Bewegung &amp; Wohlbefinden.</div></div>
        </div>
        <div class="wizard-actions">
          <button type="button" class="btn-secondary" id="toStep2b">Zurück</button>
          <button type="button" class="btn-primary" id="finishOnboard">Reise beginnen</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById("toStep2b").addEventListener("click", () => { onboardStep = 2; renderOnboarding(); });
  document.getElementById("finishOnboard").addEventListener("click", () => {
    try{
      localStorage.setItem(K.name, onboardTemp.name);
      localStorage.setItem(K.age, String(parseFloat(onboardTemp.age)));
      localStorage.setItem(K.height, String(parseFloat(onboardTemp.height)));
      localStorage.setItem(K.weight, String(parseFloat(onboardTemp.weight)));
      localStorage.setItem(K.start, String(Date.now()));
    }catch(err){
      alert("Speichern nicht möglich. Öffne diese Datei direkt im Browser (nicht in einer eingebetteten Vorschau).");
      return;
    }
    onboardStep = 1;
    render();
  });
}

/* ============ Karussell- & Countdown-Hilfsfunktionen ============ */
const ALL_DAYS_UNLOCKED_FOR_NOW = true; // Vorschau-Modus: alle 21 Tage sofort navigierbar
const TICK_COUNT = 288; // 24h in 5-Minuten-Segmenten

function maxViewableDay(start){
  return ALL_DAYS_UNLOCKED_FOR_NOW ? TAGE.length : currentDay(start);
}

function buildCountdownRing(remainingMs){
  const litCount = Math.max(Math.round((remainingMs / MS_PRO_TAG) * TICK_COUNT), 0);
  let ticks = "";
  for(let i=0; i<TICK_COUNT; i++){
    const angle = (360 / TICK_COUNT) * i;
    const lit = i < litCount ? " lit" : "";
    ticks += `<line class="tick${lit}" data-i="${i}" x1="50" y1="6" x2="50" y2="12" transform="rotate(${angle} 50 50)"/>`;
  }
  return `
    <div class="ring countdown-ring">
      <svg class="tick-svg" viewBox="0 0 100 100">${ticks}</svg>
      <div class="hole">
        <div class="cd-time" id="cdTime">${formatDauer(remainingMs)}</div>
        <div class="dayof">bis Update</div>
      </div>
    </div>
  `;
}

function updateCountdownRingDOM(remainingMs){
  const litCount = Math.max(Math.round((remainingMs / MS_PRO_TAG) * TICK_COUNT), 0);
  const cdTime = document.getElementById("cdTime");
  if(cdTime) cdTime.textContent = formatDauer(remainingMs);
  const ticks = document.querySelectorAll(".tick");
  ticks.forEach((t, i) => {
    if(i < litCount) t.classList.add("lit");
    else t.classList.remove("lit");
  });
}

/* ============ Dashboard ============ */
function renderDashboard(state){
  const maxDay = maxViewableDay(state.start);
  if(viewedDay === null) viewedDay = Math.min(currentDay(state.start), maxDay);
  viewedDay = Math.min(Math.max(viewedDay, 1), maxDay);

  const tagObj = TAGE[viewedDay - 1];
  const revealed = getRevealed();
  const remainingMs = msBisNaechstemTag(state.start, currentDay(state.start));

  const ringGrad = `conic-gradient(var(--accent) ${(viewedDay/TAGE.length)*360}deg, rgba(150,140,170,0.2) 0deg)`;

  let foodGridHtml = `<div class="food-grid">`;
  tagObj.items.forEach(item => {
    const isRevealed = revealed.includes(item.id);
    if(isRevealed){
      foodGridHtml += `
        <div class="food-card ${item.ampel}" data-id="${item.id}">
          <div class="fname"><span class="femoji">${item.emoji}</span>${item.name}</div>
          <div class="fmeta">${item.kcal} kcal · ${item.kh} g KH /100g · <span class="fcolor">${item.ampel === "gruen" ? "Grün" : item.ampel === "gelb" ? "Gelb" : "Rot"}</span></div>
          ${item.unlimited ? '<span class="funlim">∞ unbegrenzt</span>' : ""}
          <div class="fhint">${escapeHtml(item.kurz)}</div>
        </div>
      `;
    } else {
      foodGridHtml += `
        <div class="food-card locked ${item.ampel}" data-id="${item.id}" data-locked="1">
          <div class="locked-inner">
            <div class="fname"><span class="femoji">${item.emoji}</span>${item.name}</div>
            <div class="fmeta">${item.kcal} kcal · ${item.kh} g KH /100g</div>
          </div>
          <div class="unlock-overlay">
            <div class="unlock-icon">✨</div>
            <div class="unlock-text">Tippen zum Entdecken</div>
          </div>
        </div>
      `;
    }
  });
  foodGridHtml += `</div>`;

  const unlockedSoFar = alleItemsBisTag(viewedDay).filter(it => revealed.includes(it.id));
  let unlockedHtml = "";
  if(unlockedSoFar.length > 0){
    const byAmpel = {rot:[], gelb:[], gruen:[]};
    unlockedSoFar.forEach(it => { if(byAmpel[it.ampel]) byAmpel[it.ampel].push(it); });
    const buildRow = (arr) => `
      <div class="unlocked-row">
        ${arr.map(it => `<div class="unlocked-chip ${it.ampel}"><span class="uc-emoji">${it.emoji}</span>${escapeHtml(it.name)}</div>`).join("")}
      </div>
    `;
    unlockedHtml = `
      <div class="unlocked-strip">
        <div class="us-label">Bisher freigeschaltet · ${unlockedSoFar.length}</div>
        <div class="unlocked-rows">
          ${buildRow(byAmpel.rot)}
          ${buildRow(byAmpel.gelb)}
          ${buildRow(byAmpel.gruen)}
        </div>
      </div>
    `;
  }

  const slideClass = direction === "next" ? "slide-next" : direction === "prev" ? "slide-prev" : "";

  const dayPageHtml = `
    <div class="day-page ${slideClass}">
      <div class="rings-row">
        <div class="ring" style="background:${ringGrad}">
          <div class="hole">
            <div class="daylabel">Tag</div>
            <div class="daynum">${viewedDay}</div>
            <div class="dayof">von ${TAGE.length}</div>
          </div>
        </div>
        ${buildCountdownRing(remainingMs)}
      </div>
      <div class="day-tip">${escapeHtml(tagObj.tipp)}</div>
      ${foodGridHtml}
      <button class="recipe-cta" id="recipeCta">🍽 Rezepte für Tag ${viewedDay}</button>
      ${unlockedHtml}
    </div>
  `;

  let completeHtml = "";
  if(viewedDay === TAGE.length){
    completeHtml = `
      <div class="complete-card glass">
        <button class="btn-primary complete-cta" id="completeCta">🎉 Geschafft – schau dir deine Reise an</button>
      </div>
    `;
  }

  app.innerHTML = `
    <header class="top">
      <div class="top-left">
        <div class="logo-mini">${logoSvg(34)}</div>
        <div class="hello">Hallo <b>${escapeHtml(state.name)}</b></div>
      </div>
      <button class="reset-link" id="resetBtn">Reise zurücksetzen</button>
    </header>

    <div class="day-carousel glass">
      <button class="carousel-nav-btn prev" id="prevDayBtn" ${viewedDay<=1 ? "disabled" : ""}>‹</button>
      <button class="carousel-nav-btn next" id="nextDayBtn" ${viewedDay>=maxDay ? "disabled" : ""}>›</button>
      ${dayPageHtml}
    </div>

    ${completeHtml}

    ${isDebugMode() ? `
      <div class="debug-panel">
        <span>Test-Modus (?debug=1)</span>
        <button id="debugSkipBtn">Uhr +24h vorspulen</button>
      </div>
    ` : ""}
  `;

  document.querySelectorAll(".food-card").forEach(card => {
    card.addEventListener("click", () => {
      const item = tagObj.items.find(i => i.id === card.dataset.id);
      if(!item) return;
      if(card.dataset.locked === "1") revealItem(item.id);
      openFoodModal(item);
      render();
    });
  });

  const prevBtn = document.getElementById("prevDayBtn");
  const nextBtn = document.getElementById("nextDayBtn");
  if(prevBtn) prevBtn.addEventListener("click", () => {
    if(viewedDay > 1){ direction = "prev"; viewedDay--; render(); }
  });
  if(nextBtn) nextBtn.addEventListener("click", () => {
    if(viewedDay < maxDay){ direction = "next"; viewedDay++; render(); }
  });

  const recipeCta = document.getElementById("recipeCta");
  if(recipeCta) recipeCta.addEventListener("click", () => openCheckinThenRecipe(viewedDay, state));

  const completeCta = document.getElementById("completeCta");
  if(completeCta) completeCta.addEventListener("click", () => {
    rainFoodEmojis();
    openEvaluationModal(state);
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    if(confirm("Deine gesamte Lernreise wird gelöscht und du beginnst wieder bei Tag 1. Fortfahren?")){
      Object.values(K).forEach(k => localStorage.removeItem(k));
      viewedDay = null;
      direction = null;
      render();
    }
  });

  const debugBtn = document.getElementById("debugSkipBtn");
  if(debugBtn){
    debugBtn.addEventListener("click", () => {
      localStorage.setItem(K.start, String(state.start - MS_PRO_TAG));
      render();
    });
  }

  if(intervalHandle) clearInterval(intervalHandle);
  intervalHandle = setInterval(() => {
    const rem = msBisNaechstemTag(state.start, currentDay(state.start));
    updateCountdownRingDOM(rem);
  }, 1000);
}

/* ============ Tages-Check Popup -> Rezept-Modal ============ */
function openCheckinThenRecipe(day, state){
  const checkin = getCheckin(day);
  if(checkin.activity && checkin.wellbeing){
    openRecipeModal(day, state);
  } else {
    renderCheckinModal(day, state);
  }
}

function renderCheckinModal(day, state){
  const overlay = document.getElementById("overlay");
  const modal = document.getElementById("modalBody");
  const checkin = getCheckin(day);
  modal.className = "modal";
  modal.innerHTML = `
    <div class="modal-head">
      <div class="femoji">💬</div>
      <h3>Dein Tages-Check – Tag ${day}</h3>
    </div>
    <p class="desc">Kurz beantworten, dann bekommst du deine passenden Rezepte für Tag ${day}.</p>
    <div class="checkin-modal-row">
      <div class="row-label">Wie viel hast du dich heute bewegt?</div>
      <div class="choice-row" id="mActivity">
        <button class="choice-btn ${checkin.activity==='wenig'?'active':''}" data-level="wenig">Wenig</button>
        <button class="choice-btn ${checkin.activity==='mittel'?'active':''}" data-level="mittel">Mittel</button>
        <button class="choice-btn ${checkin.activity==='viel'?'active':''}" data-level="viel">Viel</button>
      </div>
    </div>
    <div class="checkin-modal-row">
      <div class="row-label">Wie fühlst du dich heute?</div>
      <div class="choice-row" id="mWellbeing">
        <button class="choice-btn ${checkin.wellbeing==='schlecht'?'active':''}" data-level="schlecht">😞 Schlecht</button>
        <button class="choice-btn ${checkin.wellbeing==='neutral'?'active':''}" data-level="neutral">😐 Neutral</button>
        <button class="choice-btn ${checkin.wellbeing==='gut'?'active':''}" data-level="gut">😊 Gut</button>
      </div>
    </div>
    <button class="close-btn" id="closeModal">Abbrechen</button>
  `;
  overlay.classList.remove("hidden");

  function wire(){
    document.getElementById("mActivity").querySelectorAll(".choice-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        setCheckin(day, {activity: btn.dataset.level});
        const c = getCheckin(day);
        if(c.activity && c.wellbeing) openRecipeModal(day, state);
        else renderCheckinModal(day, state);
      });
    });
    document.getElementById("mWellbeing").querySelectorAll(".choice-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        setCheckin(day, {wellbeing: btn.dataset.level});
        const c = getCheckin(day);
        if(c.activity && c.wellbeing) openRecipeModal(day, state);
        else renderCheckinModal(day, state);
      });
    });
    document.getElementById("closeModal").addEventListener("click", closeModal);
  }
  wire();
  overlay.onclick = (e) => { if(e.target === overlay) closeModal(); };
}

function openRecipeModal(day, state){
  const overlay = document.getElementById("overlay");
  const modal = document.getElementById("modalBody");
  const checkin = getCheckin(day);
  const activity = checkin.activity || "mittel";
  const targets = computeTargets(state.age, state.height, state.weight, activity);
  const factor = Math.min(Math.max(targets.protein / REF_PROTEIN, 0.5), 2.2);
  const rez = REZEPTE[day];

  function renderZutat(z){
    if(z.unlimited) return `<li><span class="zname">${z.name}</span><span class="zamt">nach Belieben</span></li>`;
    if(z.fix) return `<li><span class="zname">${z.name}</span><span class="zamt">${z.fix}</span></li>`;
    const amt = z.scale ? scaleAmount(z.base, factor) : z.base;
    return `<li><span class="zname">${z.name}</span><span class="zamt">${amt} ${z.unit}</span></li>`;
  }
  function renderRezept(meal, label){
    const r = rez[meal];
    return `
      <div class="recipe-block">
        <div class="rmeal">${label}</div>
        <h4>${r.title}</h4>
        <div class="rdesc">${r.desc}</div>
        <ul class="zutaten">${r.zutaten.map(renderZutat).join("")}</ul>
        <ol class="schritte">${r.schritte.map(s=>`<li>${s}</li>`).join("")}</ol>
      </div>
    `;
  }

  modal.className = "modal";
  modal.innerHTML = `
    <div class="modal-head">
      <div class="femoji">🍽</div>
      <h3>Rezepte für Tag ${day}</h3>
    </div>
    <div class="recipe-needs">
      <div class="rn-title">Deine grobe Tagesempfehlung — ${AKTIVITAET[activity].label}${checkin.wellbeing ? " · " + WOHLBEFINDEN[checkin.wellbeing].emoji + " " + WOHLBEFINDEN[checkin.wellbeing].label : ""}</div>
      <div class="rn-grid">
        <div class="rn-stat"><div class="rv">${targets.protein} g</div><div class="rl">Protein</div></div>
        <div class="rn-stat"><div class="rv">${targets.fettMin}–${targets.fettMax} g</div><div class="rl">Fett, Spielraum</div></div>
        <div class="rn-stat"><div class="rv">${targets.carbs} g</div><div class="rl">Kohlenhydrate</div></div>
        <div class="rn-stat"><div class="rv">${targets.kcal}</div><div class="rl">kcal, ca.</div></div>
      </div>
      <div class="rn-tip">${escapeHtml(RN_TIPS[(day - 1) % RN_TIPS.length])}</div>
    </div>
    ${renderRezept("morgen","Morgens")}
    ${renderRezept("mittag","Mittags")}
    ${renderRezept("abend","Abends")}
    <button class="close-btn" id="closeModal">Schließen</button>
  `;
  overlay.classList.remove("hidden");
  document.getElementById("closeModal").addEventListener("click", closeModal);
  overlay.onclick = (e) => { if(e.target === overlay) closeModal(); };
}

function openEvaluationModal(state){
  const overlay = document.getElementById("overlay");
  const modal = document.getElementById("modalBody");

  const wbLog = getWellbeingLog();
  const actLog = getActivityLog();

  let wbHtml = "";
  if(wbLog.length > 0){
    const counts = {schlecht:0, neutral:0, gut:0};
    wbLog.forEach(e => { if(counts[e.level] !== undefined) counts[e.level]++; });
    const half = Math.max(Math.floor(wbLog.length/2), 1);
    const firstAvg = wbLog.slice(0, half).reduce((s,e)=>s+(WOHLBEFINDEN[e.level]?.score||2),0) / half;
    const lastAvg = wbLog.slice(-half).reduce((s,e)=>s+(WOHLBEFINDEN[e.level]?.score||2),0) / half;
    let trend;
    if(lastAvg - firstAvg > 0.3) trend = "Dein Wohlbefinden hat sich im Verlauf der Reise spürbar verbessert. 🌱";
    else if(firstAvg - lastAvg > 0.3) trend = "Dein Wohlbefinden war zuletzt niedriger als am Anfang – achte in den nächsten Tagen gut auf dich.";
    else trend = "Dein Wohlbefinden ist über die Reise recht stabil geblieben.";
    wbHtml = `
      <div class="wellbeing-summary">
        <h4>Dein Wohlbefinden im Verlauf</h4>
        <div class="wb-counts">
          <div><span class="wb-num">😊 ${counts.gut}</span>Gut</div>
          <div><span class="wb-num">😐 ${counts.neutral}</span>Neutral</div>
          <div><span class="wb-num">😞 ${counts.schlecht}</span>Schlecht</div>
        </div>
        <div class="wb-trend">${trend}</div>
      </div>
    `;
  }

  let actHtml = "";
  if(actLog.length > 0){
    const actScore = {wenig:1, mittel:2, viel:3};
    const counts = {wenig:0, mittel:0, viel:0};
    actLog.forEach(e => { if(counts[e.level] !== undefined) counts[e.level]++; });
    const half = Math.max(Math.floor(actLog.length/2), 1);
    const firstAvg = actLog.slice(0, half).reduce((s,e)=>s+(actScore[e.level]||2),0) / half;
    const lastAvg = actLog.slice(-half).reduce((s,e)=>s+(actScore[e.level]||2),0) / half;
    let trend;
    if(lastAvg - firstAvg > 0.3) trend = "Du hast dich im Verlauf der Reise spürbar mehr bewegt. 🏃";
    else if(firstAvg - lastAvg > 0.3) trend = "Deine Bewegung hat zuletzt etwas nachgelassen – auch kleine Spaziergänge zählen.";
    else trend = "Dein Bewegungslevel ist über die Reise recht konstant geblieben.";
    actHtml = `
      <div class="activity-summary">
        <h4>Deine Bewegung im Verlauf</h4>
        <div class="act-counts">
          <div><span class="act-num">🏃 ${counts.viel}</span>Viel</div>
          <div><span class="act-num">🚶 ${counts.mittel}</span>Mittel</div>
          <div><span class="act-num">🛋️ ${counts.wenig}</span>Wenig</div>
        </div>
        <div class="act-trend">${trend}</div>
      </div>
    `;
  }

  if(!wbHtml && !actHtml){
    wbHtml = `<p class="desc">Du hast deine 21 Tage abgeschlossen. Mach beim nächsten Mal täglich den kurzen Tages-Check, dann bekommst du hier eine Auswertung zu Wohlbefinden und Bewegung.</p>`;
  }

  modal.className = "modal";
  modal.innerHTML = `
    <div class="modal-head">
      <div class="femoji">🏆</div>
      <h3>Du hast es geschafft, ${escapeHtml(state.name)}!</h3>
    </div>
    <p class="desc">21 Tage, in denen du gelernt hast, worauf es bei deiner Ernährung wirklich ankommt.</p>
    ${wbHtml}
    ${actHtml}
    <button class="close-btn" id="closeModal">Schließen</button>
  `;
  overlay.classList.remove("hidden");
  document.getElementById("closeModal").addEventListener("click", closeModal);
  overlay.onclick = (e) => { if(e.target === overlay) closeModal(); };
}

function rainFoodEmojis(){
  const emojis = [];
  TAGE.forEach(t => t.items.forEach(i => emojis.push(i.emoji)));
  if(emojis.length === 0) return;
  const container = document.createElement("div");
  container.className = "food-rain";
  document.body.appendChild(container);
  const count = 42;
  for(let i=0; i<count; i++){
    const span = document.createElement("span");
    span.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const left = Math.random()*100;
    const duration = 2.6 + Math.random()*1.4;
    const delay = Math.random()*0.7;
    const size = 1.2 + Math.random()*1.3;
    span.style.left = left + "%";
    span.style.fontSize = size + "rem";
    span.style.animation = `foodFall ${duration}s ease-in ${delay}s forwards`;
    container.appendChild(span);
  }
  setTimeout(() => container.remove(), 4200);
}

function closeModal(){ document.getElementById("overlay").classList.add("hidden"); }

render();
