<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Die Keto-Lernreise</title>
<style>
  :root{
    --ink: #2b2a35;
    --ink-dim: #6b6879;
    --ink-faint: #9491a3;
    --glass-bg: rgba(255,255,255,0.55);
    --glass-bg-strong: rgba(255,255,255,0.78);
    --glass-border: rgba(255,255,255,0.65);
    --glass-shadow: 0 8px 32px rgba(80,70,140,0.12);
    --gruen: #4f9d6e;
    --gelb: #c8933a;
    --rot: #c85a52;
    --accent: #a878d1;
    --accent2: #5fb8c9;
    --font-display: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:linear-gradient(180deg,#fdf9f6 0%, #f6f4fb 45%, #f2f8f6 100%);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 16px 90px;
    line-height:1.5;
    position:relative;
    overflow-x:hidden;
  }

  /* ---------- Bokeh-Hintergrund ---------- */
  .bokeh{position:fixed; inset:0; overflow:hidden; z-index:-1; pointer-events:none;}
  .orb{position:absolute; border-radius:50%; filter:blur(60px); opacity:0.55; will-change:transform;}
  .orb1{width:340px; height:340px; background:radial-gradient(circle at 30% 30%, #ffd6e8, transparent 70%); top:-80px; left:-60px; animation:float1 26s ease-in-out infinite;}
  .orb2{width:420px; height:420px; background:radial-gradient(circle at 40% 40%, #c9e8ff, transparent 70%); top:10%; right:-120px; animation:float2 32s ease-in-out infinite;}
  .orb3{width:300px; height:300px; background:radial-gradient(circle at 50% 50%, #d8ffe0, transparent 70%); bottom:5%; left:-80px; animation:float3 28s ease-in-out infinite;}
  .orb4{width:260px; height:260px; background:radial-gradient(circle at 50% 50%, #f3e0ff, transparent 70%); bottom:-60px; right:8%; animation:float1 22s ease-in-out infinite reverse;}
  .orb5{width:220px; height:220px; background:radial-gradient(circle at 50% 50%, #fff2c9, transparent 70%); top:40%; left:38%; animation:float2 30s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(40px,60px) scale(1.08);}66%{transform:translate(-30px,20px) scale(0.95);}}
  @keyframes float2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-60px,50px) scale(1.1);}}
  @keyframes float3{0%,100%{transform:translate(0,0) scale(1);}40%{transform:translate(50px,-40px) scale(1.05);}75%{transform:translate(-20px,-70px) scale(0.92);}}

  .wrap{width:100%; max-width:640px;}

  .glass{
    background:var(--glass-bg);
    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);
    border:1px solid var(--glass-border);
    box-shadow:var(--glass-shadow);
    border-radius:20px;
  }

  button{cursor:pointer; border:none; font-family:var(--font-body);}
  input[type=text], input[type=number]{
    background:rgba(255,255,255,0.75);
    border:1px solid rgba(255,255,255,0.85);
    color:var(--ink);
    font-size:1rem;
    padding:13px 16px;
    border-radius:12px;
    font-family:var(--font-body);
    outline:none;
    width:100%;
  }
  input:focus{border-color:var(--accent);}
  .btn-primary{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff;
    font-weight:600;
    font-size:0.98rem;
    padding:14px 18px;
    border-radius:12px;
    transition:filter 0.15s, transform 0.1s;
    box-shadow:0 6px 20px -6px rgba(150,120,200,0.55);
  }
  .btn-primary:hover{filter:brightness(1.06);}
  .btn-primary:active{transform:translateY(1px);}
  .btn-primary:disabled{opacity:0.4; cursor:not-allowed;}
  .btn-secondary{
    background:rgba(255,255,255,0.55);
    color:var(--ink-dim);
    border:1px solid rgba(255,255,255,0.8);
    border-radius:12px;
    padding:13px 16px;
    font-size:0.9rem;
  }
  .choice-row{display:flex; gap:8px; flex-wrap:wrap;}
  .choice-btn{
    background:rgba(255,255,255,0.5);
    border:1px solid rgba(255,255,255,0.8);
    color:var(--ink-dim);
    border-radius:12px;
    padding:11px 10px;
    font-size:0.84rem;
    flex:1;
    min-width:90px;
    text-align:center;
    transition:all 0.15s;
  }
  .choice-btn:hover{background:rgba(255,255,255,0.85); color:var(--ink);}
  .choice-btn.active{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff;
    border-color:transparent;
    box-shadow:0 4px 14px -4px rgba(150,120,200,0.6);
  }

  /* ---------- Logo ---------- */
  .logo-badge{display:flex; align-items:center; justify-content:center;}
  .logo-badge svg{display:block;}
  .logo-mini{width:34px; height:34px; flex-shrink:0;}

  /* ---------- Onboarding Wizard ---------- */
  .onboard{
    min-height:78vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px 6px;
  }
  .onboard-card{
    width:100%;
    max-width:420px;
    padding:36px 30px;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
  }
  .wizard-dots{display:flex; gap:7px; margin-bottom:4px;}
  .wizard-dots .wdot{width:7px; height:7px; border-radius:50%; background:rgba(150,140,170,0.3); transition:all 0.2s;}
  .wizard-dots .wdot.active{background:var(--accent); width:20px; border-radius:5px;}
  .onboard h1{font-family:var(--font-display); font-size:1.75rem; font-weight:400;}
  .onboard h2{font-family:var(--font-display); font-size:1.3rem; font-weight:400;}
  .onboard p.lead{color:var(--ink-dim); font-size:0.92rem; max-width:340px;}
  .onboard form{display:flex; flex-direction:column; gap:12px; width:100%;}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}
  .field-label{font-size:0.74rem; color:var(--ink-faint); text-align:left; margin-bottom:5px;}
  .wizard-actions{display:flex; gap:10px; width:100%; margin-top:6px;}
  .wizard-actions .btn-secondary{flex:0 0 auto;}
  .wizard-actions .btn-primary{flex:1;}

  .mini-cards{display:flex; flex-direction:column; gap:10px; width:100%; text-align:left;}
  .mini-card{
    display:flex; align-items:center; gap:12px;
    background:rgba(255,255,255,0.55);
    border:1px solid rgba(255,255,255,0.7);
    border-radius:14px;
    padding:12px 14px;
  }
  .mini-card .mc-icon{font-size:1.3rem; flex-shrink:0;}
  .mini-card .mc-text{font-size:0.82rem; color:var(--ink-dim);}

  /* ---------- Dashboard ---------- */
  header.top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom:18px;
    padding:0 4px;
  }
  .top-left{display:flex; align-items:center; gap:10px;}
  .hello{font-size:0.86rem; color:var(--ink-dim);}
  .hello b{color:var(--ink); font-weight:700;}
  .reset-link{
    background:none;
    color:var(--ink-faint);
    font-size:0.74rem;
    text-decoration:underline;
    text-underline-offset:3px;
  }

  .ring-card{
    display:flex;
    align-items:center;
    gap:20px;
    padding:20px 22px;
    margin-bottom:14px;
  }
  .ring{position:relative; width:80px; height:80px; flex-shrink:0; border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .ring .hole{position:absolute; inset:6px; background:var(--glass-bg-strong); border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .ring .daynum{font-family:var(--font-display); font-size:1.4rem; line-height:1;}
  .ring .dayof{font-size:0.6rem; color:var(--ink-faint); letter-spacing:0.5px;}
  .ring-info{flex:1; min-width:0;}
  .ring-info h2{font-family:var(--font-display); font-weight:400; font-size:1.05rem; margin-bottom:5px;}
  .countdown{font-family:var(--font-mono); font-size:0.8rem; color:var(--gelb);}
  .countdown.done{color:var(--gruen);}
  .progress-dots{display:flex; gap:3px; margin-top:9px; flex-wrap:wrap;}
  .dot{width:7px; height:7px; border-radius:50%; background:rgba(150,140,170,0.25);}
  .dot.filled-gruen{background:var(--gruen);}
  .dot.filled-gelb{background:var(--gelb);}
  .dot.filled-rot{background:var(--rot);}
  .dot.today{box-shadow:0 0 0 2px var(--glass-bg-strong), 0 0 0 3px var(--accent);}

  /* ---------- Tages-Check & Tagesbedarf ---------- */
  .check-card{padding:18px 20px; margin-bottom:14px;}
  .check-card h3{font-family:var(--font-display); font-weight:400; font-size:1rem; margin-bottom:2px;}
  .check-row{margin-top:14px;}
  .check-row .row-label{font-size:0.78rem; color:var(--ink-dim); margin-bottom:8px;}

  .needs-card{padding:18px 20px; margin-bottom:14px;}
  .needs-card h3{font-family:var(--font-display); font-weight:400; font-size:1rem; margin-bottom:2px;}
  .needs-sub{font-size:0.74rem; color:var(--ink-faint); margin-bottom:12px;}
  .needs-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:8px;}
  .need-stat{background:rgba(255,255,255,0.55); border-radius:12px; padding:10px 10px; text-align:center;}
  .need-stat.wide{grid-column:span 2;}
  .need-stat .val{font-family:var(--font-display); font-size:1.15rem; white-space:nowrap;}
  .need-stat .lbl{font-size:0.66rem; color:var(--ink-faint); margin-top:2px;}
  .fat-tip{
    display:flex; gap:9px; align-items:flex-start;
    background:rgba(168,120,209,0.1);
    border-left:3px solid var(--accent);
    border-radius:10px;
    padding:10px 12px;
    margin-top:11px;
    font-size:0.76rem;
    color:var(--ink-dim);
    line-height:1.5;
  }
  .needs-note{font-size:0.68rem; color:var(--ink-faint); margin-top:10px; line-height:1.5;}
  .edit-link{
    background:none; color:var(--accent); font-size:0.72rem;
    text-decoration:underline; text-underline-offset:3px; margin-top:8px; display:inline-block;
  }

  .legend-strip{
    display:flex; gap:14px; margin-bottom:16px; padding:9px 16px;
    font-size:0.72rem; color:var(--ink-dim); flex-wrap:wrap;
    background:rgba(255,255,255,0.35); border-radius:14px;
  }
  .legend-strip span{display:flex; align-items:center; gap:5px;}
  .legend-strip i{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .legend-strip .lg{background:var(--gruen);}
  .legend-strip .lgb{background:var(--gelb);}
  .legend-strip .lr{background:var(--rot);}

  /* ---------- Tage (Akkordeon) ---------- */
  .day-block{margin-top:14px;}
  .day-header{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    cursor:pointer;
    padding:10px 4px;
  }
  .day-header-left{display:flex; align-items:center; gap:9px;}
  .day-chevron{font-size:0.7rem; color:var(--ink-faint); transition:transform 0.15s;}
  .day-title{font-family:var(--font-display); font-size:0.95rem; color:var(--ink-dim);}
  .today-pill{
    font-size:0.6rem; background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff; padding:2px 8px; border-radius:20px; font-weight:700;
  }
  .day-header::after{content:none;}
  .recipe-link{
    font-size:0.7rem; color:var(--accent); white-space:nowrap; cursor:pointer;
    background:rgba(168,120,209,0.12); padding:5px 10px; border-radius:20px; flex-shrink:0;
  }
  .day-tip{font-size:0.77rem; color:var(--ink-faint); margin:0 4px 10px; font-style:italic;}

  .food-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(146px,1fr));
    gap:9px;
  }
  .food-card{
    background:var(--glass-bg);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid var(--glass-border);
    border-left:3px solid var(--gruen);
    border-radius:14px;
    padding:12px 13px;
    cursor:pointer;
    transition:transform 0.12s;
  }
  .food-card:hover{transform:translateY(-2px);}
  .food-card.gelb{border-left-color:var(--gelb);}
  .food-card.rot{border-left-color:var(--rot);}
  .food-card .fname{font-size:0.87rem; font-weight:600; display:flex; align-items:center; gap:7px;}
  .food-card .femoji{font-size:1.15rem;}
  .food-card .fmeta{font-size:0.68rem; color:var(--ink-faint); margin-top:4px;}
  .food-card .ftag{display:inline-block; margin-top:7px; font-size:0.6rem; letter-spacing:0.4px; text-transform:uppercase; color:var(--gruen);}
  .food-card.gelb .ftag{color:var(--gelb);}
  .food-card.rot .ftag{color:var(--rot);}
  .food-card .funlim{display:inline-block; margin-top:5px; margin-left:5px; font-size:0.58rem; color:var(--accent2); font-weight:600;}

  .food-card.locked{position:relative; border-left-color:rgba(168,120,209,0.6); overflow:hidden;}
  .food-card.locked .locked-inner{filter:blur(7px); opacity:0.6; user-select:none;}
  .food-card.locked .unlock-overlay{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; background:rgba(255,255,255,0.4); text-align:center; padding:8px;
  }
  .food-card.locked .unlock-icon{font-size:1.3rem;}
  .food-card.locked .unlock-text{font-size:0.66rem; color:var(--ink); font-weight:600;}
  .food-card.locked .unlock-sub{font-size:0.58rem; color:var(--ink-dim);}
  .food-card.locked:hover .unlock-overlay{background:rgba(255,255,255,0.55);}

  .new-badge{display:inline-block; font-size:0.58rem; background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff; padding:2px 6px; border-radius:6px; margin-left:5px; font-weight:700;}

  .locked-note{color:var(--ink-faint); font-size:0.8rem; padding:14px 18px; margin-bottom:6px; border-radius:14px;}

  /* ---------- Modal ---------- */
  .overlay{position:fixed; inset:0; background:rgba(70,60,90,0.28); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;}
  .overlay.hidden{display:none;}
  .modal{
    background:rgba(255,255,255,0.88);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid rgba(255,255,255,0.9);
    border-radius:20px;
    max-width:440px; width:100%;
    padding:24px;
    max-height:85vh;
    overflow-y:auto;
    box-shadow:0 20px 60px -12px rgba(80,60,120,0.35);
  }
  .modal-head{display:flex; align-items:center; gap:12px; margin-bottom:6px;}
  .modal-head .femoji{font-size:1.9rem;}
  .modal-head h3{font-family:var(--font-display); font-weight:400; font-size:1.2rem;}
  .modal .tag-line{font-size:0.68rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--gruen); margin-bottom:14px;}
  .modal.gelb .tag-line{color:var(--gelb);}
  .modal.rot .tag-line{color:var(--rot);}
  .modal p.desc{font-size:0.88rem; color:var(--ink-dim); margin-bottom:14px;}
  table.macro{width:100%; border-collapse:collapse; font-family:var(--font-mono); font-size:0.78rem;}
  table.macro td{padding:6px 4px; border-bottom:1px solid rgba(150,140,170,0.2);}
  table.macro td:first-child{color:var(--ink-faint);}
  table.macro td:last-child{text-align:right;}
  .macro-note{font-size:0.66rem; color:var(--ink-faint); margin-top:9px;}
  .close-btn{margin-top:18px; width:100%; background:rgba(255,255,255,0.6); color:var(--ink-dim); border:1px solid rgba(255,255,255,0.8); border-radius:11px; padding:11px; font-size:0.84rem;}

  .recipe-block{margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid rgba(150,140,170,0.2);}
  .recipe-block:last-of-type{border-bottom:none; margin-bottom:4px;}
  .recipe-block .rmeal{font-size:0.64rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--accent); font-weight:700;}
  .recipe-block h4{font-family:var(--font-display); font-weight:400; font-size:1.02rem; margin:4px 0 4px;}
  .recipe-block .rdesc{font-size:0.8rem; color:var(--ink-dim); margin-bottom:8px;}
  .recipe-block ul.zutaten{list-style:none; font-size:0.8rem; margin-bottom:8px;}
  .recipe-block ul.zutaten li{padding:3px 0; display:flex; justify-content:space-between; gap:10px;}
  .recipe-block ul.zutaten li .zname{color:var(--ink);}
  .recipe-block ul.zutaten li .zamt{color:var(--ink-faint); white-space:nowrap;}
  .recipe-block ol.schritte{font-size:0.78rem; color:var(--ink-dim); padding-left:18px;}
  .recipe-block ol.schritte li{margin-bottom:4px;}
  .recipe-intro{font-size:0.76rem; color:var(--ink-faint); margin-bottom:12px; line-height:1.5;}

  /* ---------- Completion ---------- */
  .complete-card{text-align:center; padding:28px 22px; margin-bottom:16px;}
  .complete-card h2{font-family:var(--font-display); font-weight:400; font-size:1.3rem; margin-bottom:9px;}
  .complete-card p{color:var(--ink-dim); font-size:0.88rem;}
  .wellbeing-summary{
    margin-top:16px; padding-top:16px; border-top:1px solid rgba(150,140,170,0.2);
    text-align:left;
  }
  .wellbeing-summary h4{font-family:var(--font-display); font-weight:400; font-size:0.95rem; margin-bottom:8px; text-align:center;}
  .wb-counts{display:flex; justify-content:center; gap:16px; margin-bottom:8px;}
  .wb-counts div{text-align:center; font-size:0.78rem; color:var(--ink-dim);}
  .wb-counts .wb-num{font-family:var(--font-display); font-size:1.2rem; display:block;}
  .wellbeing-summary .wb-trend{font-size:0.8rem; color:var(--ink-dim); text-align:center;}

  .env-note{font-size:0.68rem; color:var(--ink-faint); text-align:center; margin-top:30px; line-height:1.6;}

  .debug-panel{margin-top:14px; padding:12px 14px; border:1px dashed var(--rot); border-radius:12px; background:rgba(200,90,82,0.06); font-size:0.74rem; color:var(--ink-dim); display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .debug-panel button{background:var(--rot); color:#fff; border-radius:8px; padding:8px 12px; font-size:0.72rem; white-space:nowrap;}

  @media (max-width:420px){
    .ring-card{flex-direction:column; text-align:center;}
    .needs-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>

<div class="bokeh">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
  <div class="orb orb5"></div>
</div>

<div class="wrap" id="app"></div>

<div class="overlay hidden" id="overlay">
  <div class="modal" id="modalBody"></div>
</div>

<script>
/* ============ LOGO ============ */
function logoSvg(size){
  return `
  <svg width="${size}" height="${size}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#a878d1"/>
        <stop offset="1" stop-color="#5fb8c9"/>
      </linearGradient>
    </defs>
    <circle cx="50" cy="50" r="47" fill="url(#lg1)" opacity="0.13"/>
    <circle cx="50" cy="50" r="47" fill="none" stroke="url(#lg1)" stroke-width="1.6"/>
    <path d="M50 18 C38 34 31 46 31 58 C31 71 39 80 50 80 C61 80 69 71 69 58 C69 46 62 34 50 18 Z
             M50 29 C56 40 60 49 60 57 C60 65 55 71 50 71 C45 71 41 66 41 59 C41 54 43 48 47 42"
          fill="url(#lg1)"/>
  </svg>`;
}

/* ============ TAGE & LEBENSMITTEL ============ */
const TAGE = [
 { tag:1, tipp:"Trink gleich morgens ein großes Glas Wasser – über Nacht verlierst du Flüssigkeit, und guter Start heißt guter Tag.",
   items:[
    {id:"olivenoel", name:"Olivenöl", emoji:"🫒", kategorie:"Fett", ampel:"gruen", unlimited:false,
      kcal:884, fett:100, protein:0, kh:0,
      desc:"Reines Fett ohne Kohlenhydrate. Olivenöl liefert einfach ungesättigte Fettsäuren und ist die Basis fast jeder Keto-Mahlzeit – es sättigt, ohne den Blutzucker zu beeinflussen."},
    {id:"zucchini", name:"Zucchini", emoji:"🥒", kategorie:"Gemüse", ampel:"gruen", unlimited:true,
      kcal:17, fett:0.3, protein:1.2, kh:3.1,

const AKTIVITAET = {
  wenig:{label:"Wenig bewegt", protPerKg:1.2, tdeeFactor:1.2},
  mittel:{label:"Mittel bewegt", protPerKg:1.6, tdeeFactor:1.375},
  viel:{label:"Viel bewegt", protPerKg:2.0, tdeeFactor:1.55},
};
const WOHLBEFINDEN = {
  schlecht:{label:"Schlecht", emoji:"😞", score:1},
  neutral:{label:"Neutral", emoji:"😐", score:2},
  gut:{label:"Gut", emoji:"😊", score:3},
};

const K = {
  name:"ketoreise_name", age:"ketoreise_alter", height:"ketoreise_groesse", weight:"ketoreise_gewicht",
  start:"ketoreise_start", revealed:"ketoreise_revealed", checkin:"ketoreise_checkin", wblog:"ketoreise_wb_log",
};
const MS_PRO_TAG = 24 * 60 * 60 * 1000;
const REF_PROTEIN = 112;

/* ============ HILFSFUNKTIONEN ============ */
function getState(){
  const name = localStorage.getItem(K.name);
  const age = parseFloat(localStorage.getItem(K.age));
  const height = parseFloat(localStorage.getItem(K.height));
  const weight = parseFloat(localStorage.getItem(K.weight));
  const start = localStorage.getItem(K.start);
  if(!name || !start || !weight || !age || !height) return null;
  return { name, age, height, weight, start: parseInt(start, 10) };
}

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function getCheckin(){
  try{
    const raw = localStorage.getItem(K.checkin);
    if(!raw) return {activity:null, wellbeing:null};
    const parsed = JSON.parse(raw);
    if(parsed.date !== todayStr()) return {activity:null, wellbeing:null};
    return {activity: parsed.activity || null, wellbeing: parsed.wellbeing || null};
  }catch(e){ return {activity:null, wellbeing:null}; }
}

function setCheckin(partial){
  const current = getCheckin();
  const merged = {date: todayStr(), activity: current.activity, wellbeing: current.wellbeing, ...partial};
  localStorage.setItem(K.checkin, JSON.stringify(merged));
  if(merged.wellbeing){
    logWellbeing(merged.date, merged.wellbeing);
  }
}

function logWellbeing(date, level){
  let log = [];
  try{ log = JSON.parse(localStorage.getItem(K.wblog)) || []; }catch(e){ log = []; }
  const idx = log.findIndex(e => e.date === date);
  if(idx >= 0) log[idx].level = level;
  else log.push({date, level});
  localStorage.setItem(K.wblog, JSON.stringify(log));
}

function getWellbeingLog(){
  try{ return JSON.parse(localStorage.getItem(K.wblog)) || []; }catch(e){ return []; }
}

function getRevealed(){
  try{ const raw = localStorage.getItem(K.revealed); return raw ? JSON.parse(raw) : []; }catch(e){ return []; }
}
function revealItem(id){
  const revealed = getRevealed();
  if(!revealed.includes(id)){ revealed.push(id); localStorage.setItem(K.revealed, JSON.stringify(revealed)); }
}

function currentDay(start){
  const elapsed = Date.now() - start;
  const day = Math.floor(elapsed / MS_PRO_TAG) + 1;
  return Math.min(Math.max(day, 1), TAGE.length);
}
function msBisNaechstemTag(start, day){
  if(day >= TAGE.length) return 0;
  const naechsterStart = start + day * MS_PRO_TAG;
  return Math.max(naechsterStart - Date.now(), 0);
}
function formatDauer(ms){
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}
function alleItemsBisTag(day){
  let items = [];
  for(let i=0; i<day; i++) items = items.concat(TAGE[i].items);
  return items;
}
function isDebugMode(){
  try{ return new URLSearchParams(window.location.search).get("debug") === "1"; }catch(e){ return false; }
}

function computeTargets(age, height, weight, level){
  const a = AKTIVITAET[level] || AKTIVITAET.mittel;
  const bmr = 10*weight + 6.25*height - 5*age - 78; // unisex-Näherung (Mittel aus Mifflin-St Jeor m/w)
  const kcal = Math.round(Math.max(bmr, 800) * a.tdeeFactor);
  const protein = Math.round(weight * a.protPerKg);
  const carbs = 25;
  const fettFull = Math.max(Math.round((kcal - protein*4 - carbs*4) / 9), 0);
  const fettMin = Math.max(Math.round(fettFull * 0.5), 0);
  return {protein, kcal, carbs, fettMin, fettMax: fettFull};
}

function scaleAmount(base, factor){
  const val = base * factor;
  return Math.max(Math.round(val/5)*5, 5);
}
function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

let expandedDays = null;
let checkinEditMode = false;

function render(){
  const state = getState();
  if(!state){ renderOnboarding(); } else { renderDashboard(state); }
}

/* ---------- Onboarding (3 Seiten) ---------- */
function renderOnboarding(){
  if(intervalHandle) clearInterval(intervalHandle);
  if(onboardStep === 1) renderOnboardStep1();
  else if(onboardStep === 2) renderOnboardStep2();
  else renderOnboardStep3();
}

function wizardDots(step){
  let html = '<div class="wizard-dots">';
  for(let i=1;i<=3;i++) html += `<div class="wdot ${i===step?'active':''}"></div>`;
  return html + '</div>';
}

/* ---------- Dashboard ---------- */
function renderDashboard(state){
  const day = currentDay(state.start);
  const fertig = day >= TAGE.length && msBisNaechstemTag(state.start, day) === 0;
  const items = alleItemsBisTag(day);
  const revealed = getRevealed();
  const checkin = getCheckin();

  if(expandedDays === null) expandedDays = new Set([day]);

  const ringGrad = `conic-gradient(var(--accent) ${(day/TAGE.length)*360}deg, rgba(150,140,170,0.2) 0deg)`;

  let dotsHtml = "";
  TAGE.forEach((t, idx) => {
    const dayNum = idx + 1;
    let cls = "dot";
    if(dayNum <= day) cls += ` filled-${t.items[0].ampel}`;
    if(dayNum === day) cls += " today";
    dotsHtml += `<div class="${cls}" title="Tag ${dayNum}"></div>`;
  });

  let countdownHtml = fertig
    ? `<div class="countdown done">Alle 21 Tage abgeschlossen ✓</div>`
    : `<div class="countdown" id="countdownEl">Nächstes Lebensmittel in ${formatDauer(msBisNaechstemTag(state.start, day))}</div>`;

  let completeHtml = "";
  if(fertig){
    const log = getWellbeingLog();
    let wbHtml = "";
    if(log.length > 0){
      const counts = {schlecht:0, neutral:0, gut:0};
      log.forEach(e => { if(counts[e.level] !== undefined) counts[e.level]++; });
      const half = Math.max(Math.floor(log.length/2), 1);
      const firstAvg = log.slice(0, half).reduce((s,e)=>s+(WOHLBEFINDEN[e.level]?.score||2),0) / half;
      const lastAvg = log.slice(-half).reduce((s,e)=>s+(WOHLBEFINDEN[e.level]?.score||2),0) / half;
      let trend;
      if(lastAvg - firstAvg > 0.3) trend = "Dein Wohlbefinden hat sich im Verlauf der Reise spürbar verbessert. 🌱";
      else if(firstAvg - lastAvg > 0.3) trend = "Dein Wohlbefinden war zuletzt niedriger als am Anfang – achte in den nächsten Tagen gut auf dich.";
      else trend = "Dein Wohlbefinden ist über die Reise recht stabil geblieben.";
      wbHtml = `
        <div class="wellbeing-summary">
          <h4>Dein Wohlbefinden im Verlauf</h4>
          <div class="wb-counts">
            <div><span class="wb-num">😊 ${counts.gut}</span>Gut</div>
            <div><span class="wb-num">😐 ${counts.neutral}</span>Neutral</div>
            <div><span class="wb-num">😞 ${counts.schlecht}</span>Schlecht</div>
          </div>
          <div class="wb-trend">${trend}</div>
        </div>
      `;
    }
    completeHtml = `
      <div class="complete-card glass">
        <h2>Geschafft, ${escapeHtml(state.name)}.</h2>

        ${wbHtml}
      </div>
    `;
  }

  // Tages-Check (Bewegung + Wohlbefinden) oder Tagesbedarf
  const complete = checkin.activity && checkin.wellbeing;
  let checkHtml = "";
  if(!complete || checkinEditMode){
    checkHtml = `

  if(!fertig){
    const naechsteAnzahl = TAGE[day].items.length;
    lockedNote = `<div class="locked-note glass">Morgen kommen ${naechsteAnzahl} weitere Lebensmittel dazu. Kaffee und Wasser sind schon jetzt und immer uneingeschränkt erlaubt.</div>`;
  }

  app.innerHTML = `
    <header class="top">
      <div class="top-left">
        <div class="logo-mini">${logoSvg(34)}</div>
        <div class="hello">Hallo <b>${escapeHtml(state.name)}</b></div>
      </div>
      <button class="reset-link" id="resetBtn">Reise zurücksetzen</button>
    </header>

    <div class="ring-card glass">
      <div class="ring" style="background:${ringGrad}">
        <div class="hole">
          <div class="daynum">${Math.min(day, TAGE.length)}</div>
          <div class="dayof">von ${TAGE.length}</div>
        </div>
      </div>
      <div class="ring-info">
        <h2>${fertig ? "Reise abgeschlossen" : `Tag ${day} von ${TAGE.length}`}</h2>
        ${countdownHtml}
        <div class="progress-dots">${dotsHtml}</div>
      </div>
    </div>

    ${checkHtml}

    <div class="legend-strip">
      <span><i class="lg"></i>Grün: uneingeschränkt</span>
      <span><i class="lgb"></i>Gelb: in Maßen</span>
      <span><i class="lr"></i>Rot: nur wenig</span>
    </div>

    ${completeHtml}
    ${lockedNote}
    ${cardsHtml}

    <div class="env-note">
      Fortschritt wird lokal in deinem Browser gespeichert. Öffne die Datei direkt im Browser-Tab, damit der Speicher zuverlässig funktioniert.
    </div>

    ${isDebugMode() && !fertig ? `
      <div class="debug-panel">
        <span>Test-Modus (?debug=1)</span>
        <button id="debugSkipBtn">+24h vorspulen</button>
      </div>
    ` : ""}
  `;

  document.querySelectorAll(".food-card").forEach(card => {
    card.addEventListener("click", () => {
      const item = items.find(i => i.id === card.dataset.id);
      if(!item) return;
      if(card.dataset.locked === "1") revealItem(item.id);
      openFoodModal(item);
      render();
    });
  });

  document.querySelectorAll(".recipe-link").forEach(link => {
    link.addEventListener("click", (e) => {
      e.stopPropagation();
      openRecipeModal(parseInt(link.dataset.recipeday, 10), state);
    });
  });

  document.querySelectorAll(".day-header").forEach(header => {
    header.addEventListener("click", () => {
      const d = parseInt(header.dataset.day, 10);
      if(expandedDays.has(d)) expandedDays.delete(d); else expandedDays.add(d);
      render();
    });
  });

  const activityChoices = document.getElementById("activityChoices");
  if(activityChoices){
    activityChoices.querySelectorAll(".choice-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        setCheckin({activity: btn.dataset.level});
        checkinEditMode = false;
        render();
      });
    });
  }
  const wellbeingChoices = document.getElementById("wellbeingChoices");
  if(wellbeingChoices){
    wellbeingChoices.querySelectorAll(".choice-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        setCheckin({wellbeing: btn.dataset.level});
        checkinEditMode = false;
        render();
      });
    });
  }
  const editBtn = document.getElementById("editCheckin");
  if(editBtn){
    editBtn.addEventListener("click", () => { checkinEditMode = true; render(); });
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if(confirm("Deine gesamte Lernreise wird gelöscht und du beginnst wieder bei Tag 1. Fortfahren?")){
      Object.values(K).forEach(k => localStorage.removeItem(k));
      expandedDays = null;
      checkinEditMode = false;
      render();
    }
  });

  const debugBtn = document.getElementById("debugSkipBtn");
  if(debugBtn){
    debugBtn.addEventListener("click", () => {
      localStorage.setItem(K.start, String(state.start - MS_PRO_TAG));
      render();
    });
  }

  if(intervalHandle) clearInterval(intervalHandle);
  if(!fertig){
    intervalHandle = setInterval(() => {
      const newDay = currentDay(state.start);
      if(newDay !== day){ render(); return; }
      const el = document.getElementById("countdownEl");
      if(el) el.textContent = `Nächstes Lebensmittel in ${formatDauer(msBisNaechstemTag(state.start, newDay))}`;
    }, 1000);
  }
}

function openFoodModal(item){
  const overlay = document.getElementById("overlay");
  const modal = document.getElementById("modalBody");
  modal.className = `modal ${item.ampel}`;
  modal.innerHTML = `
    <div class="modal-head">
      <div class="femoji">${item.emoji}</div>
      <h3>${item.name}</h3>
    </div>
    <div class="tag-line">${AMPEL_LABEL[item.ampel]}${item.unlimited ? " · Sättigungsbeilage, unbegrenzt" : ""}</div>
    <p class="desc">${item.desc}</p>
    <table class="macro">
      <tr><td>Kalorien</td><td>${item.kcal} kcal</td></tr>
      <tr><td>Fett</td><td>${item.fett} g</td></tr>
      <tr><td>Protein</td><td>${item.protein} g</td></tr>
      <tr><td>Kohlenhydrate</td><td>${item.kh} g</td></tr>
    </table>
    <div class="macro-note">Werte pro 100 g, gerundet. Kategorie: ${item.kategorie}.</div>
    <button class="close-btn" id="closeModal">Schließen</button>
  `;
  overlay.classList.remove("hidden");
  document.getElementById("closeModal").addEventListener("click", closeModal);
  overlay.addEventListener("click", (e) => { if(e.target === overlay) closeModal(); });
}

function openRecipeModal(day, state){
  const overlay = document.getElementById("overlay");
  const modal = document.getElementById("modalBody");
  const checkin = getCheckin();
  const activity = checkin.activity || "mittel";
  const targets = computeTargets(state.age, state.height, state.weight, activity);
  const factor = Math.min(Math.max(targets.protein / REF_PROTEIN, 0.5), 2.2);
  const rez = REZEPTE[day];

  function renderZutat(z){
    if(z.unlimited) return `<li><span class="zname">${z.name}</span><span class="zamt">nach Belieben</span></li>`;
    if(z.fix) return `<li><span class="zname">${z.name}</span><span class="zamt">${z.fix}</span></li>`;
    const amt = z.scale ? scaleAmount(z.base, factor) : z.base;
    return `<li><span class="zname">${z.name}</span><span class="zamt">${amt} ${z.unit}</span></li>`;
  }
  function renderRezept(meal, label){
    const r = rez[meal];
    return `
      <div class="recipe-block">
        <div class="rmeal">${label}</div>
        <h4>${r.title}</h4>
        <div class="rdesc">${r.desc}</div>
        <ul class="zutaten">${r.zutaten.map(renderZutat).join("")}</ul>
        <ol class="schritte">${r.schritte.map(s=>`<li>${s}</li>`).join("")}</ol>
      </div>
    `;
  }

  modal.className = "modal";
  modal.innerHTML = `
    <div class="modal-head">
      <div class="femoji">🍽</div>
      <h3>Rezepte für Tag ${day}</h3>
    </div>
    <div class="recipe-intro">Mengen grob angepasst an ${targets.protein}g Protein/Tag (${AKTIVITAET[activity].label.toLowerCase()}). Sättigungsbeilagen dürfen zusätzlich unbegrenzt dazu gegessen werden.</div>
    ${renderRezept("morgen","Morgens")}
    ${renderRezept("mittag","Mittags")}
    ${renderRezept("abend","Abends")}
    <button class="close-btn" id="closeModal">Schließen</button>
  `;
  overlay.classList.remove("hidden");
  document.getElementById("closeModal").addEventListener("click", closeModal);
  overlay.addEventListener("click", (e) => { if(e.target === overlay) closeModal(); });
}

function closeModal(){ document.getElementById("overlay").classList.add("hidden"); }

render();
</script>
</body>
</html>
